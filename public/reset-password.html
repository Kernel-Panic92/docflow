<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Restablecer contraseña — DocFlow</title>
<style>
  :root {
    --bg:#0d0f14; --surface:#161a23; --surface2:#1e2330; --border:#2a3045;
    --accent:#4f8ef7; --accent2:#f7944f; --success:#4fbe96; --danger:#f7614f;
    --text:#e8ecf5; --muted:#7a85a0; --font:'Segoe UI',Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:420px;max-width:100%;animation:slideUp .3s ease}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .logo{font-size:20px;font-weight:700;margin-bottom:8px}
  .logo span{color:var(--accent)}
  .sub{color:var(--muted);font-size:13px;margin-bottom:28px}
  .title{font-size:18px;font-weight:600;margin-bottom:8px}
  .desc{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:24px}
  .error{background:rgba(247,97,79,.1);border:1px solid rgba(247,97,79,.3);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--danger);margin-bottom:16px;display:none}
  .error.show{display:block}
  .success{background:rgba(79,190,150,.1);border:1px solid rgba(79,190,150,.3);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--success);margin-bottom:16px;display:none}
  .success.show{display:block}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;padding:12px 14px;outline:none;transition:border .2s}
  .field input:focus{border-color:var(--accent)}
  .field .hint{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4}
  .btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:13px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
  .btn:hover{opacity:.85}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .requirements{background:var(--surface2);border-radius:8px;padding:14px;margin-bottom:20px;font-size:12px;color:var(--muted)}
  .requirements li{margin:4px 0;padding-left:8px}
  .requirements li.valid{color:var(--success)}
  .requirements li.valid::before{content:'✓ '}
  .requirements li::before{content:'✗ '}
  .back{text-align:center;margin-top:20px}
  .back a{color:var(--accent);text-decoration:none;font-size:13px}
  .back a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="box" id="box">
  <div class="logo">DocFlow <span>DOCS</span></div>
  <div class="sub">Gestión Documental</div>

  <div id="token-error" class="error"></div>
  <div id="success-msg" class="success"></div>

  <!-- Form de nueva contraseña -->
  <div id="form-section">
    <div class="title" id="form-title">Nueva contraseña</div>
    <div class="desc" id="form-desc">Ingresa tu nueva contraseña.</div>

    <div class="requirements">
      <li id="req-len" class="valid">Al menos 8 caracteres</li>
      <li id="req-up">Una mayúscula</li>
      <li id="req-num">Un número</li>
      <li id="req-sym">Un carácter especial (!@#$...)</li>
    </div>

    <div class="field">
      <label>NUEVA CONTRASEÑA</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password"/>
    </div>
    <div class="field">
      <label>CONFIRMAR CONTRASEÑA</label>
      <input type="password" id="password2" placeholder="••••••••" autocomplete="new-password"/>
    </div>

    <button class="btn" id="btn-submit" onclick="doReset()">Guardar nueva contraseña</button>
  </div>

  <div class="back">
    <a href="/">Volver al login</a>
  </div>
</div>

<script src="/reset-password.js"></script>
</body>
</html>
