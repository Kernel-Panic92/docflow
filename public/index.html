<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitamar Docs</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0f14;--surface:#161a23;--surface2:#1e2330;--border:#2a3045;
  --accent:#4f8ef7;--accent2:#f7944f;--success:#4fbe96;--warning:#f7d44f;
  --danger:#f7614f;--text:#e8ecf5;--muted:#7a85a0;
  --font-head:'Plus Jakarta Sans',sans-serif;--font-body:'DM Sans',sans-serif;
}
body.light{--bg:#f0f2f7;--surface:#ffffff;--surface2:#e8eaf0;--border:#d0d4e4;--text:#1a1d2e;--muted:#5a6180}
body.light .sidebar{background:#fff;border-right-color:#d0d4e4;box-shadow:2px 0 14px rgba(0,0,0,.06)}
body.light .card,body.light .tbl{background:#fff;border-color:#d0d4e4;box-shadow:0 1px 4px rgba(0,0,0,.05)}
body.light .modal{background:#fff}
body.light input,body.light select,body.light textarea{background:#f0f2f7;border-color:#d0d4e4}
body.light tr:hover td{background:rgba(0,0,0,.03)}
body.light thead th{background:#f0f2f7}
body.light .nav-item:hover{background:#f0f2f7}
body.light .nav-item.active{background:rgba(79,142,247,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;transition:background .2s,color .2s}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 20% 50%,rgba(79,142,247,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(247,148,79,.06) 0%,transparent 50%),var(--bg)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:420px;max-width:95vw;box-shadow:0 24px 80px rgba(0,0,0,.5);animation:slideUp .35s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.login-logo{font-family:var(--font-head);font-size:22px;font-weight:800;letter-spacing:-.2px;margin-bottom:6px}
.login-logo span{color:var(--accent)}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:32px}
.login-title{font-family:var(--font-head);font-size:20px;font-weight:700;margin-bottom:24px}
.login-error{background:rgba(247,97,79,.1);border:1px solid rgba(247,97,79,.3);border-radius:9px;padding:11px 14px;font-size:13px;color:var(--danger);margin-bottom:16px;display:none}
.login-error.show{display:block}
.login-link{text-align:center;margin-top:16px}
.login-link a{color:var(--accent);text-decoration:none;font-size:13px}

/* ── LAYOUT ── */
.layout{display:flex;min-height:100vh}
#app-screen{display:none;width:100%}
#app-screen.show{display:flex}

/* ── SIDEBAR ── */
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;position:fixed;height:100vh;z-index:10;transition:transform .28s cubic-bezier(.4,0,.2,1)}
.sidebar.open{transform:translateX(0)}
.logo{padding:0 24px 16px;font-family:var(--font-head);font-size:18px;font-weight:800;letter-spacing:-.2px}
.logo span{color:var(--accent)}
.user-info{margin:0 16px 20px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.user-name{font-family:var(--font-head);font-size:13px;font-weight:700}
.user-role{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;display:block;margin-top:2px}
.role-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;margin-top:6px}
.role-admin{background:rgba(247,97,79,.15);color:var(--danger)}
.role-contador{background:rgba(79,142,247,.15);color:var(--accent)}
.role-tesorero{background:rgba(247,212,79,.15);color:var(--warning)}
.role-comprador{background:rgba(79,190,150,.15);color:var(--success)}
.role-auditor{background:rgba(156,156,156,.15);color:var(--muted)}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 24px;cursor:pointer;color:var(--muted);font-size:14px;font-weight:500;transition:all .2s;border-left:3px solid transparent;margin-bottom:2px}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(79,142,247,.08)}
.nav-item.hidden{display:none}
.nav-icon{font-size:17px;width:22px;text-align:center}
.nav-menu{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:8px}
.sidebar-footer{padding:12px 16px;flex-shrink:0}
.btn-logout{width:100%;background:rgba(247,97,79,.1);border:1px solid rgba(247,97,79,.2);color:var(--danger);border-radius:9px;padding:9px 14px;font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-logout:hover{background:rgba(247,97,79,.2)}

/* ── MAIN ── */
.main{margin-left:230px;flex:1;padding:32px 40px;padding-right:120px;transition:margin-left .28s}
.main-topbar{position:fixed;top:14px;right:20px;z-index:50;display:flex;align-items:center;gap:8px}
.main-icon-btn{background:var(--surface);border:1px solid var(--border);border-radius:9px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;color:var(--muted);transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.main-icon-btn:hover{color:var(--text);border-color:var(--accent)}
.main-icon-btn.logout:hover{border-color:var(--danger);color:var(--danger);background:rgba(247,97,79,.08)}

/* ── PAGE ── */
.page{display:none}
.page.active{display:block}
.page-header{margin-bottom:28px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
.page-title{font-family:var(--font-head);font-size:24px;font-weight:700;letter-spacing:-.2px;margin-bottom:4px}
.page-sub{color:var(--muted);font-size:14px}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;position:relative;overflow:hidden;transition:border-color .2s}
.stat-card:hover{border-color:var(--accent)}
.stat-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.07}
.stat-card:nth-child(1)::before{background:var(--accent)}
.stat-card:nth-child(2)::before{background:var(--accent2)}
.stat-card:nth-child(3)::before{background:var(--success)}
.stat-card:nth-child(4)::before{background:var(--warning)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:700;line-height:1.1}
.stat-value.blue{color:var(--accent)}.stat-value.orange{color:var(--accent2)}
.stat-value.green{color:var(--success)}.stat-value.yellow{color:var(--warning)}
.stat-s{font-size:12px;color:var(--muted);margin-top:6px}

/* ── TABLE ── */
.tbl{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.tbl-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px}
.tbl-title{font-family:var(--font-head);font-size:15px;font-weight:700}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--surface2)}
th{padding:11px 16px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
body.light tr:hover td{background:rgba(0,0,0,.03)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-recibida{background:rgba(96,165,250,.15);color:#60A5FA}
.b-revision{background:rgba(251,191,36,.15);color:#FBBF24}
.b-aprobada{background:rgba(52,211,153,.15);color:#34D399}
.b-causada{background:rgba(167,139,250,.15);color:#A78BFA}
.b-rechazada{background:rgba(248,113,113,.15);color:#F87171}
.b-pagada{background:rgba(110,231,183,.15);color:#6EE7B7}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:9px;font-family:var(--font-body);font-size:13.5px;font-weight:500;cursor:pointer;border:none;transition:all .18s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#3a7bf5;transform:translateY(-1px)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:rgba(247,97,79,.15);color:var(--danger);border:1px solid rgba(247,97,79,.2)}
.btn-danger:hover{background:rgba(247,97,79,.25)}
.btn-success{background:rgba(79,190,150,.15);color:var(--success);border:1px solid rgba(79,190,150,.2)}
.btn-success:hover{background:rgba(79,190,150,.25)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

/* ── FORMS ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--font-body);font-size:14px;padding:10px 14px;outline:none;transition:border .2s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}
select option{background:var(--surface2)}
input[type=password]{letter-spacing:2px}
.field{margin-bottom:14px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
.modal-title{font-family:var(--font-head);font-size:18px;font-weight:700;margin-bottom:20px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}

/* ── FILTERS ── */
.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.fb{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:var(--font-body);background:transparent;border:1px solid var(--border);color:var(--muted);transition:all .15s}
.fb:hover{border-color:var(--accent);color:var(--text)}
.fb.active{background:var(--accent);border-color:var(--accent);color:#fff}
.fc{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--surface2)}
.fb.active .fc{background:rgba(255,255,255,.2);color:#fff}

/* ── MISC ── */
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px}
.mono{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent)}
.tag{font-size:11px;padding:3px 8px;border-radius:6px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.sp{font-size:11px;color:var(--muted);padding:4px 10px;border-radius:6px;background:var(--surface2)}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.st{font-size:18px;font-weight:600;margin-bottom:4px}
.ss{font-size:13px;color:var(--muted)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 20px;font-size:14px;z-index:9999;display:none;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.4);animation:fadeIn .2s ease}
.toast.show{display:flex}
.toast.success{border-color:var(--success)}
.toast.error{border-color:var(--danger)}
.toast.info{border-color:var(--accent)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── MISC COMPONENTS ── */
.ci{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;border:1px solid var(--border);background:var(--surface2);transition:all .15s}
.ci:hover{border-color:var(--accent)}
.ci.sel{background:rgba(79,142,247,.1);border-color:var(--accent)}
.cb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.cb.sel{background:var(--accent);border-color:var(--accent)}
.cd{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .15s}
.cd:hover{transform:scale(1.1)}
.cd.sel{outline:2px solid currentColor;outline-offset:2px}
.cp{display:flex;gap:8px;flex-wrap:wrap}
.progress-line{display:flex;align-items:center;gap:4px;margin-bottom:16px}
.fs{text-align:center;padding:8px 10px;border-radius:8px;min-width:90px;border:1px solid var(--border);background:var(--surface2);flex-shrink:0}
.fs.active{background:rgba(79,142,247,.1);border-color:var(--accent)}
.fs-l{font-size:11px;font-weight:500;color:var(--muted)}
.fs.active .fs-l{color:var(--accent)}
.fs-d{font-size:10px;color:var(--border);margin-top:3px}
.fc2{width:20px;height:2px;background:var(--border);flex-shrink:0}
.fc2.active{background:var(--accent)}

/* ── RESPONSIVE ── */
.mob-hamburger{display:none;position:fixed;top:14px;left:14px;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:9px;width:40px;height:40px;font-size:18px;cursor:pointer;color:var(--text);align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;backdrop-filter:blur(2px)}
.mob-overlay.visible{display:block}

@media(max-width:768px){
  .mob-hamburger{display:flex}
  .main-topbar{top:10px;right:10px}
  .main{padding-right:90px}
  .sidebar{transform:translateX(-100%)}
  .main{margin-left:0;padding:60px 16px 24px}
  .stats-row{grid-template-columns:repeat(2,1fr);gap:12px}
  .form-grid{grid-template-columns:1fr}
  .tbl{overflow-x:auto}
  .tbl table{min-width:600px}
  .modal{width:95vw!important;padding:20px}
}
@media(max-width:480px){
  .main{padding:60px 12px 20px}
  .stats-row{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
  .stat-card{padding:14px}
  .stat-value{font-size:22px!important}
  .page-title{font-size:20px}
  .tbl{overflow-x:visible}
  .tbl table,.tbl thead,.tbl tbody,.tbl th,.tbl td,.tbl tr{display:block}
  .tbl thead{display:none}
  .tbl tbody tr{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;padding:12px}
  .tbl tbody td{padding:6px 0;border:none;font-size:13px;display:flex;align-items:center;gap:8px}
  .tbl tbody td::before{content:attr(data-label);font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);min-width:80px;flex-shrink:0}
  .filters{flex-direction:column}
  .fb{width:100%;justify-content:center}
  .modal{width:100vw!important;min-height:100dvh;border-radius:0!important;margin:0}
  .modal-overlay{align-items:flex-end}
  .form-grid{grid-template-columns:1fr;gap:12px}
}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">VITAMAR <span>DOCS</span></div>
    <div class="login-sub">Gestión Documental de Facturas</div>
    <div class="login-title">Iniciar sesión</div>
    <div class="login-error" id="login-error"></div>
    <div class="field">
      <label>CORREO</label>
      <input type="email" id="login-email" placeholder="admin@vitamar.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>CONTRASEÑA</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">Ingresar</button>
    <div class="login-link">
      <a href="#" onclick="showForgot(event)">¿Olvidaste tu contraseña?</a>
    </div>
  </div>
</div>

<!-- Forgot password modal -->
<div id="forgot-modal" class="modal-overlay" onclick="if(event.target===this)closeForgot()">
  <div class="modal" style="max-width:420px">
    <div class="modal-title">Recuperar contraseña</div>
    <div class="field">
      <label>CORREO ELECTRÓNICO</label>
      <input type="email" id="forgot-email" placeholder="tu@email.com"/>
    </div>
    <div id="forgot-msg" style="margin-bottom:14px;font-size:13px"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeForgot()">Cancelar</button>
      <button class="btn btn-primary" onclick="doForgot()">Enviar enlace</button>
    </div>
  </div>
</div>

<!-- Change password modal -->
<div id="chpass-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">Cambiar contraseña</div>
    <div class="field">
      <label>NUEVA CONTRASEÑA</label>
      <input type="password" id="chpass-new" placeholder="••••••••" autocomplete="new-password"/>
      <div style="margin-top:8px;font-size:11px;color:var(--muted)">
        <div id="req-len">✓ 8+ caracteres</div>
        <div id="req-up">✓ Una mayúscula</div>
        <div id="req-num">✓ Un número</div>
        <div id="req-sym">✓ Un carácter especial</div>
      </div>
    </div>
    <div class="field">
      <label>CONFIRMAR</label>
      <input type="password" id="chpass-confirm" placeholder="••••••••" autocomplete="new-password"/>
    </div>
    <div id="chpass-msg" style="font-size:13px;margin-bottom:14px"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="doChangePass()">Guardar</button>
    </div>
  </div>
</div>

<!-- App -->
<div id="app-screen">
  <!-- Mobile hamburger -->
  <button class="mob-hamburger" onclick="toggleSidebar()">☰</button>
  <div class="mob-overlay" id="mob-overlay" onclick="closeSidebar()"></div>

  <div class="sidebar" id="sidebar">
    <div class="logo">VITAMAR <span>DOCS</span></div>
    <div class="user-info">
      <div class="user-name" id="u-name">—</div>
      <div class="user-role" id="u-role">—</div>
      <span class="role-badge" id="u-badge"></span>
    </div>
    <nav class="nav-menu" id="nav"></nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </div>

  <div class="main" id="main">
    <div class="main-topbar">
      <button class="main-icon-btn" onclick="toggleTheme()" title="Cambiar tema" id="theme-btn">🌙</button>
      <button class="main-icon-btn logout" onclick="doLogout()" title="Cerrar sesión">↩</button>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- Modal root -->
<div id="mroot"></div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const S={
  token:localStorage.getItem('vd_t'),
  usuario:JSON.parse(localStorage.getItem('vd_u')||'null'),
  view:'dashboard',
  areas:[],
  cats:[],
  theme:localStorage.getItem('vd_theme')||'dark'
};
const COLS=['#3B82F6','#10B981','#F59E0B','#8B5CF6','#EC4899','#F97316','#06B6D4','#84CC16'];
const PASOS=[{id:'recepcion',l:'Recepción',d:'Sistema recibe'},{id:'revision',l:'Revisión',d:'Asigna CC'},{id:'aprobacion',l:'Aprobación',d:'Responsable'},{id:'causacion',l:'Causación',d:'Tesorería'},{id:'pagada',l:'Pagada',d:'Archivada'}];
const EORD=['recibida','revision','aprobada','causada','pagada'];
const EM={recibida:{l:'Recibida',c:'#60A5FA'},revision:{l:'En revisión',c:'#FBBF24'},aprobada:{l:'Aprobada',c:'#34D399'},causada:{l:'Causada',c:'#A78BFA'},rechazada:{l:'Rechazada',c:'#F87171'},pagada:{l:'Pagada',c:'#6EE7B7'}};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmt(v){return '$'+Math.round(parseFloat(v)||0).toLocaleString('es-CO')}
function fdate(d){if(!d)return'—';return new Date(d).toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'})}
function bdg(e){const m=EM[e]||{l:e,c:'#888'};return`<span class="badge b-${e}">${m.l}</span>`}
function ctag(c,n){if(!n)return'<span style="color:var(--muted)">—</span>';return`<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:${c||'#888'};flex-shrink:0"></span>${esc(n)}</span>`}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function toast(msg,type='info'){
  const t=$('toast');
  t.className=`toast ${type} show`;
  t.innerHTML=`<span>${type==='success'?'✓':type==='error'?'✗':'ℹ'}</span> ${esc(msg)}`;
  setTimeout(()=>t.classList.remove('show'),4000);
}

// ─── API ─────────────────────────────────────────────────────────────────────
async function api(m,p,b,isF){
  const o={method:m,headers:{Authorization:`Bearer ${S.token}`}};
  if(b&&!isF){o.headers['Content-Type']='application/json';o.body=JSON.stringify(b)}
  else if(isF)o.body=b;
  const r=await fetch(`/api${p}`,o);
  const j=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(j.error||`HTTP ${r.status}`);
  return j;
}

// ─── PDF ─────────────────────────────────────────────────────────────────────
async function verPdf(id){
  const token = localStorage.getItem('vd_t');
  try {
    const resp = await fetch(`/api/facturas/${id}/pdf`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!resp.ok) {
      const err = await resp.json().catch(()=>({error:'Error'}));
      toast(err.error || 'Error cargando PDF', 'error');
      return;
    }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    $('mroot').innerHTML=`<div class="modal-overlay open" onclick="if(event.target===this){closeM();URL.revokeObjectURL('${url}');}">
      <div class="modal" style="width:90vw;max-width:900px;height:85vh;display:flex;flex-direction:column">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <span style="font-family:var(--font-head);font-size:16px;font-weight:700">Factura PDF</span>
          <button class="btn btn-secondary btn-sm" onclick="closeM();URL.revokeObjectURL('${url}')">✕ Cerrar</button>
        </div>
        <iframe src="${url}" style="flex:1;border:none;border-radius:8px;background:#fff"></iframe>
      </div>
    </div>`;
  } catch(e) {
    toast('Error cargando PDF', 'error');
  }
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
async function doLogin(){
  const email=$('login-email').value.trim();
  const pass=$('login-pass').value;
  const errEl=$('login-error');
  errEl.classList.remove('show');
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pass})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'Error');
    S.token=d.token;S.usuario=d.usuario;
    localStorage.setItem('vd_t',d.token);localStorage.setItem('vd_u',JSON.stringify(d.usuario));
    if(d.cambio_password)showChPass();else showApp();
  }catch(ex){errEl.textContent=ex.message;errEl.classList.add('show')}
}
function doLogout(){localStorage.removeItem('vd_t');localStorage.removeItem('vd_u');S.token=null;S.usuario=null;$('app-screen').classList.remove('show');$('login-screen').style.display='flex'}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&$('login-screen').style.display!=='none')doLogin()});

function showForgot(e){e.preventDefault();$('forgot-modal').classList.add('open')}
function closeForgot(){$('forgot-modal').classList.remove('open');$('forgot-email').value='';$('forgot-msg').innerHTML=''}
async function doForgot(){
  const email=$('forgot-email').value.trim();
  if(!email)return;
  try{
    await fetch('/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    $('forgot-msg').innerHTML=`<span style="color:var(--success)">✓ Se envió un enlace a tu correo.</span>`;
    setTimeout(closeForgot,3000);
  }catch(e){$('forgot-msg').innerHTML=`<span style="color:var(--danger)">${e.message}</span>`}
}

function showChPass(){$('chpass-modal').classList.add('open')}
$('chpass-new').addEventListener('input',function(){
  const p=this.value;
  $('req-len').style.color=p.length>=8?'var(--success)':'';
  $('req-up').style.color=/[A-Z]/.test(p)?'var(--success)':'';
  $('req-num').style.color=/[0-9]/.test(p)?'var(--success)':'';
  $('req-sym').style.color=/[!@#$%^&*(),.?":{}|<>_\-+=]/.test(p)?'var(--success)':'';
});
async function doChangePass(){
  const p1=$('chpass-new').value,p2=$('chpass-confirm').value;
  if(p1!==p2){$('chpass-msg').innerHTML='<span style="color:var(--danger)">Las contraseñas no coinciden</span>';return}
  try{
    await api('POST','/auth/cambio-forzado',{password:p1});
    $('chpass-modal').classList.remove('open');
    toast('Contraseña actualizada','success');
    showApp();
  }catch(e){$('chpass-msg').innerHTML=`<span style="color:var(--danger)">${e.message}</span>`}
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function showApp(){
  $('login-screen').style.display='none';
  $('app-screen').classList.add('show');
  document.body.className=S.theme;
  $('theme-btn').textContent=S.theme==='dark'?'🌙':'☀️';
  $('u-name').textContent=S.usuario?.nombre||'—';
  $('u-role').textContent=S.usuario?.rol||'—';
  const rolClass={'admin':'role-admin','contador':'role-contador','tesorero':'role-tesorero','comprador':'role-comprador','auditor':'role-auditor'};
  $('u-badge').className=`role-badge ${rolClass[S.usuario?.rol]||'role-comprador'}`;
  $('u-badge').textContent=S.usuario?.rol||'';
  buildNav();goTo('dashboard');
}

function buildNav(){
  let h='';
  for(const sec of SECS){
    const items=NAV.filter(n=>n.s===sec.id&&(!n.admin||S.usuario?.rol==='admin'));
    if(!items.length)continue;
    h+=`<div style="font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:10px 24px 4px;margin-top:4px">${sec.l}</div>`;
    for(const n of items)h+=`<div class="nav-item" id="nv-${n.id}" onclick="goNav('${n.id}')">${n.i}<span style="flex:1">${n.l}</span>${n.badge?`<span class="badge" style="font-size:10px;padding:2px 6px;background:${n.w?'rgba(251,191,36,.15)':'rgba(79,142,247,.15)'};color:${n.w?'var(--warning)':'var(--accent)'}" id="nb-${n.badge}">0</span>`:''}</div>`;
  }
  $('nav').innerHTML=h;
}
function goNav(v){closeSidebar();goTo(v)}
function setNav(id){
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  const e=$(`nv-${id}`);if(e)e.classList.add('active');
  const T={'dashboard':'Dashboard','facturas':'Facturas','pendientes':'Pendientes','aprobaciones':'Aprobaciones','causacion':'Causación','categorias':'Categorías','areas':'Áreas','usuarios':'Usuarios','backup':'Backup'};
  $('content').parentElement.querySelector('.page-title')?.remove();
  $('content').parentElement.querySelector('.page-sub')?.remove();
}
async function goTo(v){
  S.view=v;setNav(v);
  const el=$('content');el.innerHTML='<div class="empty">Cargando…</div>';
  try{
    if(v==='dashboard')await rDash();
    else if(v==='facturas')await rFacturas();
    else if(v==='pendientes')await rPend();
    else if(v==='aprobaciones')await rAprob();
    else if(v==='causacion')await rCaus();
    else if(v==='categorias')await rCats();
    else if(v==='areas')await rAreas();
    else if(v==='usuarios')await rUsers();
    else if(v==='backup')await rBackup();
    else el.innerHTML='<div class="empty">Módulo en construcción</div>';
  }catch(ex){el.innerHTML=`<div class="empty" style="color:var(--danger)">${ex.message}</div>`}
}
async function refreshBadges(){
  try{const f=await api('GET','/facturas?limit=200');const all=f.data||[];const nb=$('nb-f');const np=$('nb-p');if(nb)nb.textContent=f.total||all.length;if(np)np.textContent=all.filter(x=>x.estado==='revision').length}catch(_){}

// ─── DASHBOARD ───────────────────────────────────────────────────────────────

    </div>`;

function stat(l,v,c){return`<div class="stat-card"><div class="stat-label">${l}</div><div class="stat-value ${c}">${v}</div></div>`}

async function checkSyncStatus(){
  try{
    const r=await api('GET','/sync/status');
    if(r.sincronizando){
      return{bar:`<div style="background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.3);border-radius:12px;padding:16px;margin-bottom:20px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <span style="font-weight:600;color:var(--accent)">Sincronizando correo...</span>
          <span style="color:var(--muted);font-size:13px">${r.procesando}/${r.totalMensajes}</span>
        </div>
        <div style="background:var(--surface2);border-radius:6px;height:8px;overflow:hidden">
          <div style="background:var(--accent);height:100%;width:${r.progreso}%;transition:width .3s"></div>
        </div>
        <div style="margin-top:8px;font-size:12px;color:var(--muted)">${r.mensaje}</div>
      </div>`};
    }else{
      const btn=r.ultimoSyncFormateado?`<button class="btn btn-secondary btn-sm" onclick="iniciarSync()" title="Sincronizar ahora">Sincronizar</button>`:'';
      return{bar:`<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:13px;color:var(--muted)">Ultima sync: ${r.ultimoSyncFormateado||'Nunca'} - ${r.mensaje||''}</div>
        ${btn}
      </div>`};
    }
  }catch(e){return{bar:''}}
}

async function iniciarSync(){
  try{
    await api('POST','/sync/sync');
    toast('Sincronizacion iniciada','info');
    if(S.view==='dashboard')rDash();
  }catch(e){toast(e.message,'error')}
}

let fFiltro='todas';
async function rFacturas(filtro){
  if(filtro!==undefined)fFiltro=filtro;
  const q=fFiltro==='todas'?'':('?estado='+fFiltro);
  const f=await api('GET',`/facturas${q}&limit=100`);S.facturas=f.data||[];
  const all=f.data||[];
  const cnts={todas:f.total||all.length};
  ['recibida','revision','aprobada','causada','rechazada'].forEach(e=>cnts[e]=all.filter(x=>x.estado===e).length);
  const fbs=[{id:'todas',l:'Todas'},{id:'recibida',l:'Recibidas'},{id:'revision',l:'En revisión'},{id:'aprobada',l:'Aprobadas'},{id:'causada',l:'Causadas'},{id:'rechazada',l:'Rechazadas'}].map(fb=>`<button class="fb${fFiltro===fb.id?' active':''}" onclick="rFacturas('${fb.id}')">${fb.l}<span class="fc">${cnts[fb.id]||0}</span></button>`).join('');
  $('content').innerHTML=`
    <div class="page-header"><div><div class="page-title">Facturas</div><div class="page-sub">Gestión completa del ciclo documental</div></div><button class="btn btn-primary" onclick="mNuevaF()">+ Nueva factura</button></div>
    <div class="filters">${fbs}</div>
    <div class="tbl">
      <div class="tbl-head"><div class="tbl-title">${cnts.todas} factura(s)</div></div>
      <table><thead><tr><th># Factura</th><th>Proveedor</th><th>Categoría</th><th>Área</th><th>Valor</th><th>Estado</th><th>Límite DIAN</th><th></th></tr></thead>
      <tbody>${all.length?all.map(f=>`<tr onclick="abrirF('${f.id}')"><td class="mono" data-label="Factura">${esc(f.numero_factura)}</td><td data-label="Proveedor" style="font-weight:500">${esc(f.proveedor_nombre||'—')}</td><td data-label="Categoría">${ctag(f.categoria_color,f.categoria_nombre)}</td><td data-label="Área" style="color:var(--muted)">${esc(f.area_nombre||'Sin asignar')}</td><td data-label="Valor" style="font-weight:500">${fmt(f.valor_total||f.valor||0)}</td><td data-label="Estado">${bdg(f.estado)}</td><td data-label="DIAN" style="color:${f.dian_tacita?'var(--warning)':'var(--muted)'}">${fdate(f.limite_dian)}</td><td>${f.archivo_pdf?`<span onclick="event.stopPropagation();verPdf('${f.id}')" title="Ver PDF" style="color:var(--accent);font-size:16px;cursor:pointer">📄</span>`:''}</td></tr>`).join(''):'<tr><td colspan="8" class="empty">Sin facturas</td></tr>'}</tbody></table>
    </div>`;
  refreshBadges();
}

// ─── NUEVA FACTURA ───────────────────────────────────────────────────────────
async function mNuevaF(){
  if(!S.areas.length)S.areas=await api('GET','/areas');
  if(!S.cats.length)S.cats=await api('GET','/categorias');
  const ao=S.areas.map(a=>`<option value="${a.id}">${esc(a.nombre)}</option>`).join('');
  const co=S.cats.map(c=>`<option value="${c.id}">${esc(c.nombre)}</option>`).join('');
  window.gF=async()=>{
    const n=$('fn-num').value.trim();if(!n){toast('Número de factura requerido','error');return}
    const v=parseFloat($('fn-val').value)||0,iv=parseFloat($('fn-iva').value)||0;
    const fd=new FormData();
    fd.append('numero_factura',n);fd.append('valor',v);fd.append('valor_iva',iv);fd.append('valor_total',v+iv);
    if($('fn-cat').value)fd.append('categoria_id',$('fn-cat').value);
    if($('fn-area').value)fd.append('area_responsable_id',$('fn-area').value);
    if($('fn-lp').value)fd.append('limite_pago',$('fn-lp').value);
    if($('fn-ob').value)fd.append('observaciones',$('fn-ob').value);
    if($('fn-pdf').files[0])fd.append('pdf',$('fn-pdf').files[0]);
    try{await api('POST','/facturas',fd,true);closeM();toast('Factura creada','success');goTo('facturas')}catch(e){toast(e.message,'error')}
  };
  showM('Nueva factura',`
    <div class="field"><label>NÚMERO DE FACTURA *</label><input id="fn-num" placeholder="FV-2025-0001"/></div>
    <div class="form-grid">
      <div class="field"><label>VALOR BASE</label><input id="fn-val" type="number" placeholder="0"/></div>
      <div class="field"><label>IVA</label><input id="fn-iva" type="number" placeholder="0"/></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>CATEGORÍA</label><select id="fn-cat"><option value="">— Seleccionar —</option>${co}</select></div>
      <div class="field"><label>ÁREA</label><select id="fn-area"><option value="">— Seleccionar —</option>${ao}</select></div>
    </div>
    <div class="field"><label>LÍMITE DE PAGO</label><input id="fn-lp" type="date"/></div>
    <div class="field"><label>OBSERVACIONES</label><textarea id="fn-ob" rows="2" placeholder="Notas adicionales..."></textarea></div>
    <div class="field"><label>ARCHIVO PDF</label><input id="fn-pdf" type="file" accept=".pdf" style="color:var(--text)"/></div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeM()">Cancelar</button><button class="btn btn-primary" onclick="gF()">Crear factura</button></div>`,560);

let catExp=null;
async function rCats(){
  S.areas=await api('GET','/areas');S.cats=await api('GET','/categorias');

function renderClist(){
  const el=$('clist');if(!el)return;
  if(!S.cats.length){el.innerHTML='<div class="empty">No hay categorías</div>';return}
  el.innerHTML=S.cats.map(cat=>{const an=(cat.areas||[]).map(a=>a.nombre);const ex=catExp===cat.id;
    return`<div class="tbl" style="margin-bottom:10px;overflow:hidden">

        <div style="flex:1"><div style="font-weight:600">${esc(cat.nombre)}</div><div style="font-size:12px;color:var(--muted)">${esc(cat.descripcion||'')}</div></div>

      </div>
      ${ex?`<div style="padding:16px 20px;border-top:1px solid var(--border)">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Flujo de aprobación</div>
        <div class="progress-line">${PASOS.map((p,i)=>{const a=(cat.pasos||[]).includes(p.id);return`<div class="fs${a?' active':''}"><div class="fs-l">${p.l}</div><div class="fs-d">${p.d}</div></div>${i<PASOS.length-1?`<div class="fc2${a?' active':''}"></div>`:''}`}).join('')}</div>
      </div>`:''}
    </div>`}).join('');
}
function togCat(id){catExp=catExp===id?null:id;renderClist()}
async function mCat(id){
  let cat=null;
  if(id)cat=S.cats.find(c=>c.id===id)||await api('GET',`/categorias/${id}`);
  const form=cat?{nombre:cat.nombre,desc:cat.descripcion||'',color:cat.color||'#3B82F6',pasos:[...(cat.pasos||[])],area_ids:(cat.areas||[]).map(a=>a.id)}:{nombre:'',desc:'',color:'#3B82F6',pasos:['recepcion','revision','aprobacion','causacion'],area_ids:[]};
  function rr(){
    const cp=$('cp');if(cp)cp.innerHTML=COLS.map(c=>`<div class="cd${form.color===c?' sel':''}" style="background:${c};outline-color:${c}" onclick="sCo('${c}')"></div>`).join('');
    const ca=$('ca');if(ca)ca.innerHTML=S.areas.map(a=>{const s=form.area_ids.includes(a.id);return`<div class="ci${s?' sel':''}" onclick="tA('${a.id}')"><div class="cb${s?' sel':''}">${s?'✓':''}</div><div style="flex:1"><div style="font-size:13px">${esc(a.nombre)}</div><div style="font-size:11px;color:var(--muted)">${esc(a.jefe_nombre||'')}</div></div></div>`}).join('');
    const cpa=$('cpa');if(cpa)cpa.innerHTML=PASOS.map(p=>{const s=form.pasos.includes(p.id);const f=p.id==='recepcion';return`<div class="ci${s&&!f?' sel':''}" style="${f?'opacity:.5':''}" ${f?'':'onclick="tP(\''+p.id+'\')"'}><div class="cb${s&&!f?' sel':''}">${s&&!f?'✓':''}</div><div style="flex:1"><span style="font-size:13px">${p.l}</span><span style="font-size:11px;color:var(--muted);margin-left:8px">${p.d}</span></div>${f?'<span class="tag">obligatorio</span>':''}</div>`}).join('');
  }
  window.sCo=c=>{form.color=c;rr()};
  window.tA=aid=>{form.area_ids=form.area_ids.includes(aid)?form.area_ids.filter(x=>x!==aid):[...form.area_ids,aid];rr()};
  window.tP=pid=>{form.pasos=form.pasos.includes(pid)?form.pasos.filter(x=>x!==pid):[...form.pasos,pid];rr()};
  window.saveCat=async()=>{const n=$('cn').value.trim();if(!n){toast('Nombre requerido','error');return}form.nombre=n;form.desc=$('cd').value.trim();try{if(id)await api('PUT',`/categorias/${id}`,{nombre:form.nombre,descripcion:form.desc,color:form.color,pasos:form.pasos,area_ids:form.area_ids});else await api('POST','/categorias',{nombre:form.nombre,descripcion:form.desc,color:form.color,pasos:form.pasos,area_ids:form.area_ids});closeM();toast('Categoría guardada','success');await rCats()}catch(e){toast(e.message,'error')}};
  showM(id?'Editar categoría':'Nueva categoría',`
    <div class="field"><label>NOMBRE *</label><input id="cn" value="${esc(form.nombre)}" placeholder="Ej: Tecnología"/></div>
    <div class="field"><label>DESCRIPCIÓN</label><textarea id="cd" rows="2">${esc(form.desc)}</textarea></div>
    <div style="margin-bottom:14px"><label style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;display:block;margin-bottom:8px">COLOR</label><div class="cp" id="cp"></div></div>
    <div style="margin-bottom:14px"><label style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;display:block;margin-bottom:8px">ÁREAS</label><div id="ca"></div></div>
    <div style="margin-bottom:14px"><label style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;display:block;margin-bottom:8px">PASOS DEL FLUJO</label><div id="cpa"></div></div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeM()">Cancelar</button><button class="btn btn-primary" onclick="saveCat()">Guardar</button></div>`,560);
  rr();
}

async function cargarBackups(){

    const lista=await api('GET','/backup/lista');

    tbody.innerHTML=lista.map(b=>`<tr><td style="font-weight:500">${esc(b.nombre)}</td><td>${(b.tamano/1024/1024).toFixed(2)} MB</td><td style="color:var(--muted)">${fdate(b.fecha)}</td><td><button class="btn btn-secondary btn-sm" onclick="descargarBackup('${esc(b.nombre)}')">⬇ Descargar</button> <button class="btn btn-danger btn-sm" onclick="eliminarBackup('${esc(b.nombre)}')">🗑️</button></td></tr>`).join('');
  }catch(e){$('backup-list').innerHTML=`<tr><td colspan="4" class="empty" style="color:var(--danger)">Error: ${e.message}</td></tr>`}
}

  try{toast('Generando backup...','info');const r=await api('GET','/backup/generar');toast('Backup generado: '+r.archivo,'success');await cargarBackups()}catch(e){toast(e.message,'error')}
}
function descargarBackup(n){window.open(`/api/backup/descargar/${n}`,'_blank')}
async function eliminarBackup(n){if(!confirm('¿Eliminar este backup?'))return;try{await api('DELETE',`/backup/${n}`);toast('Backup eliminado','success');await cargarBackups()}catch(e){toast(e.message,'error')}}

// ─── INIT ───────────────────────────────────────────────────────────────────
if(S.token&&S.usuario){showApp()}else{$('app-screen').classList.remove('show');$('login-screen').style.display='flex'}
setInterval(refreshBadges,60000);
</script>
